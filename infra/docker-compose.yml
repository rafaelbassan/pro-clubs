# Variáveis vêm do .env na raiz (copie de .env.example antes do primeiro up).
# Postgres e Redis são externos — configure DATABASE_URL e REDIS_URL.
# Sem ports no host — Coolify/Traefik roteia via rede Docker.
#
# Coolify: sem healthcheck Docker (Traefik derruba rota se ficar unhealthy).
# Domínio no painel: https://seu-dominio.com:3000 no serviço web.

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    expose:
      - "8000"
    networks:
      - default
      - coolify
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TIMEZONE: ${TIMEZONE:-America/Sao_Paulo}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      SEARCH_CACHE_TTL_SECONDS: ${SEARCH_CACHE_TTL_SECONDS:-3600}
      # EA bloqueia IPs de datacenter — saída via Cloudflare WARP (container warp)
      EA_HTTP_PROXY: ${EA_HTTP_PROXY:-socks5h://warp:1080}
      EA_PROXY_BASE_URL: ${EA_PROXY_BASE_URL:-}
      EA_PROXY_SECRET: ${EA_PROXY_SECRET:-}
    depends_on:
      - warp

  # Cloudflare WARP — proxy SOCKS5 para as chamadas à EA (IP Cloudflare, não o da VPS)
  warp:
    image: caomingjun/warp
    restart: unless-stopped
    expose:
      - "1080"
    environment:
      WARP_SLEEP: "2"
    device_cgroup_rules:
      - "c 10:200 rwm"
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - warp-data:/var/lib/cloudflare-warp

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      - api

networks:
  coolify:
    external: true
    name: coolify

volumes:
  warp-data:
