[project]
name = "proclubs-ingest"
version = "0.1.0"
description = "Ingest and sync Pro Clubs data"
requires-python = ">=3.9"
dependencies = [
    "pandas>=2.0.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["ingest*"]
