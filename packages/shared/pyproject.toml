[project]
name = "proclubs-shared"
version = "0.1.0"
description = "Shared schemas and constants for Pro Clubs"
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["shared*"]
